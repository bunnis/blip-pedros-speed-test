# ─────────────────────────────────────────────────────────────────────────────
# COMPLETE nginx.conf for a host/container DEDICATED to the speed test.
#
#
# ┌── Which way should you use this? ──────────────────────────────────────────┐
# │ • Nginx dedicated to ONLY this tool  → use this whole file as              │
# │   /etc/nginx/nginx.conf.                                                   │
# │ • Nginx that ALREADY serves other sites → do NOT replace your main config. │
# │   Copy ONLY the `server { ... }` block below into                          │
# │   /etc/nginx/conf.d/blip-speedtest.conf  (or sites-available/sites-enabled │
# │   symlink) and reload. Your existing http{} block already includes those,  │
# │   so the server block drops straight in.                                   │
# └────────────────────────────────────────────────────────────────────────────┘
#
# After editing:  nginx -t && systemctl reload nginx   (or: nginx -s reload)
#
# Design notes (full rationale in README.md):
#  - /dl/  serves INCOMPRESSIBLE files with compression + caching OFF, else the
#    download number measures gzip/the cache, not the link.
#  - /upload returns 204 and discards the body; nginx drains it because keepalive
#    is on, which is what lets the browser push the whole payload and time it.
#  - /ip echoes the source address nginx sees (your VPN client IP).
#  - HTTP/1.1 on purpose: the page opens ~6 parallel TCP connections to saturate
#    the tunnel; HTTP/2 would multiplex them onto one congestion window.
# ─────────────────────────────────────────────────────────────────────────────

# user  www-data;            # uncomment + set to your worker user (www-data on Debian/Ubuntu, nginx on RHEL/Alpine)
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;   # maps .html -> text/html so the page RENDERS instead of downloading
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  75s;                 # must stay on for the /upload body-drain to be reliable

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # ===== blip speed-test vhost - copy from here to create /etc/nginx/conf.d/blip-speedtest.conf =====
    server {
        listen 80;
        # listen 443 ssl;                   # optional TLS; add certs and keep this vhost on HTTP/1.1 (no http2)
        # ssl_certificate     /etc/ssl/...;
        # ssl_certificate_key /etc/ssl/...;
        server_name _;                      # internal / match-all is fine

        # Webroot holds index.html and the dl/ directory (output of make-files.sh).
        root  /var/www/blipspeedtest;
        index index.html;

        location = / {
            try_files /index.html =404;
            add_header Cache-Control "no-store" always;
        }

        # Download source: pre-generated random files under <root>/dl/.
        location /dl/ {
            types { }
            default_type application/octet-stream;
            gzip off;
            gunzip off;
            # brotli off;                    # uncomment ONLY if the brotli module is loaded
            add_header Cache-Control "no-store" always;
            sendfile on;
            tcp_nopush on;
            access_log off;
        }

        # Upload sink: accept up to 128 MB (page caps payloads at 100 MB), discard, 204.
        location = /upload {
            if ($request_method !~ ^(POST|GET|HEAD)$) { return 405; }
            client_max_body_size 128m;
            client_body_buffer_size 256k;
            access_log off;
            # The page reads Server-Timing off the tiny GET /upload latency probe and
            # subtracts it from the round-trip, isolating network time. Static nginx does
            # ~no per-request processing, so this is honestly 0 here. If you ever put a
            # dynamic backend behind this path, emit its real processing time instead
            # (e.g. proxy_pass + add_header Server-Timing "app;dur=$upstream_response_time").
            # Do NOT substitute $request_time: that includes the network round trip, which
            # would wrongly cancel out the very latency we're measuring.
            add_header Server-Timing "app;dur=0" always;
            return 204;
        }

        # Source IP echo.
        location = /ip {
            default_type text/plain;
            add_header Cache-Control "no-store" always;
            return 200 "$remote_addr\n";
        }

        client_body_timeout 60s;            # per-read timeouts, not totals; raise if slow links 408
        send_timeout        60s;
    }
    # ===== ... to here, if folding into an existing nginx =====
}
